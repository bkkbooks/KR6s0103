body:
  text: 大乘經般若部天地玄黃宇宙洪荒日月盈昃辰宿列張寒來暑往秋𭣣冬藏閏餘成嵗律呂調陽雲騰致雨露結為霜金生麗水玉出昆岡劒號巨𨷂珠稱夜光果李奈大般若波羅密多經六百卷菜重芥放光般若波羅密經三十卷薑海鹹摩訶般若波羅密經三十卷河光讚般若波羅密經一十卷淡道行般若波羅密經一十卷鱗小品般若波羅密經一十卷潛十一卷摩訶般若波羅密多鈔經五卷大明度無極經六卷二經同函羽十卷勝天王般若波羅密經二卷二譯金剛般若波羅密經三卷三譯四經同函翔十卷能斷金剛般若波羅密經二卷二譯金剛能斷般若波羅密經一卷佛說濡首菩薩無上清淨分衛經二卷仁王護國般若波羅密經二卷實相般若波羅密經般若波羅密多心經摩訶般若波羅密大明咒經三經同卷文殊師利所說摩訶般若波羅密經一卷文殊師利所說般若波羅密經一卷十經同函寶積部龍師火帝鳥官人皇始制文字大寶積經一百二十卷乃九卷大方廣三戒經三卷佛說無量清淨平等覺經二卷佛說阿彌陀經二卷佛說無量壽經二卷四經同函服九卷佛說阿閦佛國經二卷佛說大乘十法經一卷佛說普門品經一卷文殊師利佛土嚴淨經二卷佛說胞胎經一卷佛說法鏡經二卷六經同函衣八卷郁迦羅越問菩薩行經一卷幻士仁賢經一卷佛說决定毗尼經一卷發覺淨心經二卷優填王經佛說須摩提經佛說須摩提菩薩經三經同卷佛說離垢施女經一卷阿闍世王女阿述達菩薩經一卷九經同函裳十卷得無垢女經一卷文殊師利所說不思議佛境界經二卷佛說如幻三昧經三卷善住意天子所問經三卷太子刷護經太子和休經二經合卷五經同函推十卷慧上菩薩問大善權經二卷大乘顯識經二卷大乘方等要慧經彌勒菩薩所問本願經二經同卷佛遺日摩尼寶經一卷佛說摩訶衍寶嚴經一卷勝師子吼一乘大方便方廣經一卷毗耶沙問經二卷八經同函大集部位讓國大方等大集經三十卷有大乘大方等日藏經一十卷虞大方等大集月藏經一十卷陶大乘大集地藏十輪經一十卷唐十卷佛說大方廣十輪經八卷大集須彌藏經二卷二經同函弔十卷虗空孕菩薩經二卷虗空藏菩薩經一卷虗空藏神呪經觀虛空藏菩薩經二經合卷佛說菩薩念佛三昧經六卷五經同函民佛說大方等大集菩薩念佛三昧經十卷伐九卷般舟三昧經三卷陂菩薩經一卷大方等大集賢護經五卷三經同函罪十一卷阿差末菩薩經七卷無盡意菩薩經四卷二經同函周十卷大集譬喻王經二卷大哀經八卷二經同函發十卷寶女所問經四卷無言童子經二卷自在王菩薩經二卷奮迅王問經二卷四經同函殷寶星陀羅尼經八卷華嚴部湯坐朝問道垂大方廣佛華嚴經六十卷拱平章愛育黎首臣大方廣佛華嚴經八十卷伏戎羌大方廣佛華嚴經普賢菩薩行願品四十卷遐八卷信力入印法門經五卷佛華嚴入如來德智不思議境界經一卷度諸佛境界智光嚴經一卷大乘金剛髻珠菩薩修行分經一卷四經同函邇十卷大方廣入如來智德不思議經大方廣佛華嚴經修慈分二經合卷大方廣佛華嚴經不思議佛境界分大方廣如來不思議境界經二經合卷大方廣普賢所說經莊嚴菩提心經菩薩本業經三經合卷大方廣佛華嚴經續入法界品佛說兜沙經大方廣菩薩十地經三經合卷諸菩薩求佛本業經菩薩十住行道品經菩薩十住經三經合卷漸備一切智德經五卷十四經同函一十三卷十住經六卷顯無邊佛土功德經一卷度世品經六卷三經同函體十一卷佛說如來興顯經四卷佛說羅摩伽經四卷等目菩薩所問三昧經三卷三經同函涅槃部率賓歸王大般涅槃經四十卷鳴鳳在樹南本大般涅槃經三十六卷白八卷大般泥洹經六卷大般涅槃經後分二卷二經同函駒十卷佛說方等般泥洹經二卷四童子三昧經三卷大悲經五卷三經同函五大部外重譯經食十二卷合部金光明經八卷金光明經四卷二經同函場十一卷金光明最勝王經十卷伅真陀羅所問寶如來三昧經三卷二經同函化被方廣大莊嚴經十二卷普曜經八卷二經同二函草九卷妙法蓮華經十卷法華三昧經薩曇分陀利經二經合卷無量義經一卷四經同函木正法華經十卷賴十卷大乘大悲分陀利經八卷善思童子經二卷二經同函及悲華經十卷萬十卷六度集經八卷大乘頂王經一卷大方等頂王經一卷三經同函方十二卷維摩詰所說經三卷維摩詰經三卷說無垢稱經六卷三經同函蓋十二卷妙法蓮華經八卷濟品譯道神足無極變化經四卷二經同函此十一卷佛說寶雲經七卷阿惟越致遮經四卷二經同函身十三卷佛說寶雨經十卷佛升忉利天為母說法經三卷二經同函髮十卷不退轉法輪經四卷廣博嚴淨不退轉法輪經四卷入定不定印經一卷不必定入定入印經一卷四經同函四十一卷持人菩薩所問經四卷持世經四卷等集衆德三昧經三卷三經同函大十二卷集一切福德三昧經三卷大明入藏大明仁孝皇后夢感佛說第一希有大功德經一卷勝思惟梵天所問經六卷大乘同性經二卷四經同函五十卷持心梵天所問經四卷思益梵天所問經四卷佛說濟諸方等學經一卷大乘方廣捴持經一卷四經同函常十一卷證契大乘經二卷深密解脫經五卷解深密經五卷三經同函恭十六卷大灌頂神呪經十二卷大樹緊那羅王所問經四卷二經同函惟十卷藥師如來本願經一卷藥師琉璃光如來本願功德經一卷藥師琉璃光七佛本願功德經二卷阿闍世王經二卷楞伽阿跋多羅寶經四卷五經同函鞠入楞伽經十卷養十卷大乘入楞伽經七卷菩薩行方便境界神通變化經三卷二經同函豈十一卷大薩遮尼犍子受記經十卷梵書藥師琉璃光七佛本願功德經一卷二經同函敢八卷佛說解節經一卷分別緣起初勝法門經上下合卷緣生初勝分法本經上下合卷相續解脫地波羅密了義經一卷佛說文殊師利現寶藏經二卷大方廣寶篋經二卷六經同函毀十卷普超三昧經四卷放鉢經一卷大方等大雲經四卷大雲請雨經一卷四經同函傷十二卷大雲輪請雨經二卷大方等大雲請雨經一卷佛說如來智印經一卷佛說慧印三昧經一卷諸法無行經二卷諸法本無經三卷佛說無極寶三昧經二卷七經同函女月燈三昧經十一卷慕十一卷月燈三昧經一卷佛說無所希望經一卷佛說象腋經一卷佛說大淨法門品經一卷大莊嚴法門經二卷如來莊嚴智慧光明入一切境界經二卷度一切諸佛境界智嚴經一卷寶如來三昧經二卷八經同函貞十卷觀無量壽佛經一卷稱讚淨土佛攝受經佛說阿彌陀經後出阿彌陀偈經不思議神力傳附三經合卷觀彌勒菩薩上生兜率陀天經一卷佛說彌勒下生經佛說彌勒來時經彌勒下生成佛經觀彌勒菩薩下生經四經合卷彌勒成佛經一卷一切法高王經一卷第一義法勝經一卷大威燈光仙人問疑經一卷大阿彌陀經二卷十四經同函潔十卷順權方便經二卷諸法勇王經一卷太子須大拏經一卷菩薩睒子經太子慕魄經二經合卷佛說睒子經佛說九色鹿經佛說太子沐𩲸經三經同卷樂瓔珞莊嚴方便經一卷無字寶篋經大乘離文字普光照藏經佛說長者子制經三經合卷佛說月光童子經申日兒本經佛說逝童子經三經合卷佛說犢子經佛說乳光佛經無垢賢女經腹中女聽經四經合卷十六經同函男十卷大乘遍照光明藏無字法門經佛說老女人經佛說老母經老母女六英經菩薩逝經五經同卷文殊師利問菩提經伽耶山頂經二經合卷佛說象頭精舍經大乘伽耶山頂經二經合卷佛說德護長者經二卷佛說轉女身經一卷未曾有經佛說甚希有經二經合卷佛說决定捴持經佛說謗佛經二經合卷寶積三昧文殊師利菩薩問法身經入法界體性經二經合卷如來師子吼經大方廣師子吼經大乘百福相經三經合卷二十經同函效十卷佛說善恭敬經稱讚大乘功德經說妙法决定業障經三經合卷大乘百福莊嚴相經大乘四法經菩薩修行四法經希有校量功德經四經合卷佛說銀色女經阿闍世王受决經採華違王上佛受决經佛說正恭敬經四經合卷佛說最無比經佛說前世三轉經二經合卷無上依經二卷佛說了本生死經佛說自誓三昧經二經合卷具多樹下思惟子二因緣經佛說緣起聖道經佛說稻稈經三經合卷佛說轉有經文殊師利巡行經文殊尸利行經三經合卷佛說作佛形像經佛說龍施女經佛說龍施菩薩本起經八吉祥神呪經四經合卷二十六經同函才十二卷佛說諫王經如來示教勝軍王經佛為勝光天子說王法經大方等修多羅王經四經同卷如來獨證自誓三昧經佛說灌佛經佛說灌洗佛經佛說造立形像福報經四經合卷佛說八陽神呪經佛說八吉祥經佛說八佛名號經佛說盂蘭盆經四經合卷佛說報恩奉盆經佛說浴像功德經浴像功德經佛說校量珠功德經𭦟珠室利校量珠功德經五經合卷不空索心呪王經三卷內上中合卷不空索呪經一卷不空索陀羅尼經二卷不空索呪心經一卷不空索神呪心經一卷二十二經同函良知過不空索神變真言經三十卷必十一卷千眼千臂觀世音菩薩陀羅尼神呪經一卷千手千眼觀世音菩薩姥陀羅尼身經一卷千手千眼觀世音菩薩廣大圓滿無礙大悲心陀羅尼經一卷觀世音菩薩祕密藏神呪經觀世音菩薩如意摩𡰱陀羅𡰱經觀世音菩薩如意心陀羅尼經三經同卷如意輪陀羅尼經一卷觀自在菩薩怛縛多唎隨心陀羅尼經一卷大方廣菩薩藏經中文殊師利根本一字陀羅尼經𭦟殊室利菩薩呪藏中一字呪王經十二佛名神呪挍量功德除障滅罪經佛說稱讚如來功德神呪經四經同卷大金色孔雀王呪經一卷大孔雀王神呪經佛說大孔雀王雜神呪經二經合卷佛說孔雀王呪經二卷十六經同函改十二卷佛說大孔雀咒王經三卷佛母大孔雀明王經三卷佛說十一靣觀世音神呪經佛說十一靣神呪心經千轉陀羅𡰱經呪五首經六字神呪經呪三首經六經合卷佛說摩利支天陀羅尼經佛說七俱胝佛母心大凖提陀羅尼經佛說七俱胝佛母凖提大明陀羅尼經三經合卷佛說佛頂尊勝陀羅尼經一卷最勝佛頂陀羅尼淨除業障經一卷佛說一向出生菩薩經一卷種種雜呪經佛頂勝陀羅尼經二經合卷十六經同函得九卷佛頂最勝陀羅尼經佛頂尊勝陀羅𡰱經二經合卷佛說觀藥王藥上二菩薩經一卷阿難陀目佉尼呵離陀經舍利弗陀羅尼經二經合卷阿難陀目佉尼阿離陀鄰尼經佛說無量門破魔陀羅尼經二經合卷出生無邊門陀羅尼經勝幢臂印陀羅尼經妙臂印幢陀羅尼經三經同卷佛說陀羅尼集經四卷內第四卷分作二卷十一經同函能佛說陀羅尼集經八卷共部莫十二卷佛說無涯際總持法門經一卷尊勝菩薩所問一切諸法入無量法門陀羅尼經一卷金剛上味陀羅尼經一卷金剛場陀羅尼經一卷虗空藏菩薩問七佛陀羅尼經一卷無垢淨光大陀羅尼經一卷請觀世音菩薩消伏毒害陀羅𡰱經一卷華積陀羅𡰱神呪經華聚陀羅尼呪經師子奮迅菩薩所問經六字呪王經六字神呪王經五經同卷佛說持句神呪經佛說陀鄰尼鉢經東方最勝燈王如來助護持世間經如來方便善巧呪經四經合卷善法方便陀羅尼呪經金剛祕密善門陀羅尼經護命法門神呪經三經同卷內藏百寶經溫室洗浴衆僧經二經合卷佛說四不可得經梵女首意經二經合卷三十三經同函忘十二卷成具光明定意經一卷佛說須賴經二卷二譯佛說寶網經一卷菩薩