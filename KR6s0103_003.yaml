body:
  text: 西土聖賢撰集定八卷篤九卷初十卷出曜經二十卷佛本行經七卷二經作五函誠美賢愚因緣經十三卷佛所行讚經五卷二經同二函慎十一卷撰集百緣經十卷道地經一卷二經同函終十卷修行道地經八卷佛説佛醫經惟日雜難經二經合卷思惟要略法十二遊經二經合卷五經同函冝九卷僧伽羅剎所集佛行經五卷大乘修行菩薩行門諸經要集三卷佛説迦葉赴佛般涅槃經菩薩訶色欲經四品學法經佛入涅槃密迹金剛力士哀戀經佛使比丘迦栴延説法沒盡偈經佛説佛治身經佛説治意經七經合卷九經同函令十卷僧伽斯那所撰菩薩本緣經四卷百喻經二卷坐禪三昧法門經二卷五門禪經要用法一卷禪要訶欲經內身觀章句經法觀經三經合卷七經同函榮十卷付法藏因緣經六卷達磨多羅禪經二卷禪法要解經二卷三經同函業十一卷雜寶藏經八卷那先比丘經三卷二經同函所十一卷舊雜譬喻經二卷雜譬喻經三卷二譯衆經撰雜譬喻經二卷王子法益壞目因緣經一卷法句經二卷無明羅剎經一卷六經同函基十一卷阿育王譬喻經阿育王經二經共六卷阿育王傳五卷三經同函籍十卷法句譬喻經四卷四阿含暮抄解二卷迦葉結經撰集三藏及雜藏傳二經合卷三慧經阿毗曇五法行經二經同卷一百五十讚佛頌讚觀音菩薩頌文殊師利發願經六菩薩名亦當誦持經小道地經阿含口解十二因緣經六經合卷馬鳴菩薩傳龍樹菩薩傳提婆菩薩傳三經合卷十五經同函甚一卷勸發諸王要偈龍樹菩薩勸戒王頌二經合卷婆藪槃豆傳龍樹菩薩為禪陀迦王説法要偈二經合卷賔頭盧𥥛羅闍為優陀延王説法經請賔頭羅經大勇菩薩分別業報略經三經合卷迦丁比丘説當來變經大阿羅漢難提密多羅所説法住記二經合卷法集要頌經四卷菩提行經四卷今作二卷賢聖集伽陀一百頌廣發大願頌二經合卷十三經同函無十二卷佛吉祥德讚上中下合卷不動使者陀羅尼祕密法一卷金剛頂瑜伽修習毗盧遮那三摩地法一卷百千頌大集經地藏菩薩請問法身讚普賢菩薩行願讚金剛頂經瑜伽文殊師利菩薩法一品三經合卷金剛頂瑜伽經十八會指歸呵利帝母真言法二經合卷金剛頂蓮華部心念誦儀一卷金剛頂千手千眼觀自在菩薩修行儀軌一卷阿閦如來念誦供養法佛頂尊勝陀羅尼念誦儀軌二經同卷普賢金剛薩埵瑜伽念誦儀一卷金剛王菩薩祕密念誦儀軌金剛頂勝初瑜伽普賢菩薩念誦法經二經合卷十五經同函竟十一卷大樂金剛不空真實三昧耶經般若波羅密多理趣釋二卷金剛頂瑜伽金剛薩埵五祕密修行念誦儀軌一卷無量壽如來修觀行供養儀一卷佛説最勝妙吉祥根本智最上祕密一切名義三摩地分上下合卷佛説帝釋岩祕密成就儀軌聖觀自在菩薩功德讚觀自在菩薩如意輪念誦儀軌三經合卷瑜伽翳迦訖沙囉烏瑟尼沙斫訖囉真言安怛陀那儀則一字頂輪王瑜伽經大虛空藏菩薩念誦法仁王般若念誦法三經合卷大方廣佛華嚴經入法界品四十二字觀般若波羅密多理趣經大安樂不空三昧真實金剛菩薩等一十七聖大𭦟茶羅義述陀羅尼門諸部要目金剛頂瑜伽三十七尊禮受菩提心戒儀大聖文殊師利菩薩讚佛法身禮六經合卷甘露軍茶利菩薩供養念誦成就儀軌一卷觀自在多羅瑜伽念誦法聖觀自在菩薩心真言瑜伽觀行儀軌梵本大悲神呪三經合卷一切祕密最上名義大教王儀軌上下合卷大樂金剛薩埵修行成就儀軌𭦟殊室利菩薩吉祥伽陀二經合卷聖閻𭦟德迦威怒王立成大神驗念誦法大方廣𭦟殊室利童子菩薩華嚴本教讚閻𭦟德迦忿怒真言大威德儀軌品第三十二經合卷二十五經同函學十二卷佛説密迹力士大權神王經一卷大方廣𭦟殊室利童真菩薩華嚴本教讚閻𭦟德迦忿怒王真言阿毗遮盧迦儀軌品第三十一一卷成就妙法蓮華經王瑜伽觀智儀軌一卷金剛頂瑜伽降三世成就極深密門金剛頂瑜伽他化自在天理趣會普賢修行念誦儀軌二經合卷金剛壽命陀羅𡰱念誦法大藥義女歡喜母并愛子成就法二經合卷五字陀羅尼頌大孔雀明王畫像壇場儀軌大聖歡喜雙身毗那耶迦法三經合卷大威怒烏芻瑟摩儀軌大日經略説念誦隨行法二經合卷無能勝大明陀羅尼經佛説如意輪蓮華心如來修行觀門儀無能勝大明心陀羅𡰱經三經合卷大毗盧遮那成佛神變加持經略示七支念誦隨行法速疾立驗魔醯首羅天説阿尾奢法大聖𭦟殊室利童子五字瑜伽法金剛頂瑜伽金剛薩埵儀軌四經合卷一字金輪王佛頂要略念誦念法觀自在菩薩如意輪瑜伽念誦法仁王般若陀羅尼釋三經合卷蘇悉地羯羅供養法三卷今作二卷二十三經同函優十二卷文殊師利菩薩及諸仙所説吉凶時日善惡宿曜經二卷略述金剛頂瑜伽分別聖位修證法門一字佛頂輪王念誦儀軌十不善業道經三經合卷金剛頂觀自在如來修行法金剛首光明灌頂經最勝立印聖無動尊大威怒王念誦儀軌法品二經合卷金剛頂經瑜伽觀自在王如來修行法一卷金剛頂瑜伽經文殊師利菩薩儀軌供養法一卷瑜伽蓮華部念誦法事師五十頌三經合卷妙吉祥平等瑜伽祕密觀身成佛儀軌一卷仁王護國經道場念誦軌儀一卷金剛頂經一切如來真實攝大乘現證大教王經二卷文殊所説最勝名義經上下合卷大悲心陀羅尼修行念誦略儀妙吉祥平等觀門大教王經略出護摩儀金剛頂超勝三界文殊五字真言三經合卷大乘律登菩薩地持經八卷仕菩薩善戒經九卷攝十卷菩薩善戒經一卷梵網經二卷優婆塞戒經七卷三經同函職十卷菩薩瓔珞本業經二卷菩薩戒本一卷菩薩戒本經菩薩戒羯磨文二經合卷佛説淨業障經一卷佛