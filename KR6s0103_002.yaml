body:
  text: 小乘經阿含部剋念佛説長阿含經二十二卷作聖德建名立中阿含經六十卷形端表正空增一阿含經五十卷谷傅聲虗堂雜阿含經五十卷習針𥊸十三卷別譯雜阿含經二十卷雜阿含經一卷長阿含十報法經二卷禍十一卷佛般泥洹經二卷佛説方等泥洹經二卷大般涅槃經三卷佛説人本欲生經一卷佛説梵志阿颰經一卷佛説梵網六十二見經佛説尸迦羅越六方禮經二經合卷佛説寂志果經一卷八經同函因起世經十卷惡起世因本經十卷積十卷樓炭經六卷佛説七知經佛説醎水喻經佛説一切流攝守因經三經合卷佛説四諦經佛説恆水經佛説本相倚致經三經合卷中本起經二卷八經同函福十卷佛説緣本致經佛説頂生王故事經佛説文陀竭王經三經合卷佛説閻羅王五天使者經佛説鐵城泥犂經佛説古來世時經三經同卷佛説阿那律八念經佛説離睡經佛説是法非法經三經同卷佛説求欲經佛説受嵗經佛説梵志計水淨經三經同卷佛説苦陰經佛説釋摩男本經佛説苦陰因事經三經合卷佛説樂想經佛説漏分布經佛説阿耨跋經三經同卷佛説諸法本經佛説瞿曇記果經佛説瞻婆比丘經三經合卷佛説伏經佛説魔嬈亂經佛説弊魔試目連經三經合卷泥犂經優婆夷墮舍迦經佛説齋經三經合卷佛説廣義法門經佛説戒德香經佛説四人出現世間經三經合卷佛説賴吒和羅經佛説善生子經佛説經佛説梵志頞波羅延問種尊經四經合卷三十四經同函緣十卷三歸五戒慈心猒離功德經佛説須達經佛為黃竹園老婆羅門説學經佛説梵魔喻經四經合卷佛説尊上經佛説鸚鵡經佛説兜調經佛説意經佛説應法經五經同卷佛説鞞摩肅經佛説婆羅門子命終愛念不離經佛説十支居士八城人經佛説邪見經佛説箭喻經佛説普法義經六經同卷佛説波斯匿王太后崩塵土坌身經須摩提女經二經同卷婆羅門避死經施食獲五福報經頻婆娑羅王詣佛供養經佛説長者六過出家經佛説鴦掘摩經五經合卷佛説鴦掘髻經佛説四未曾有法經佛説力士移山經佛説舍利弗目犍連遊四衢經四經合卷七佛父母姓字經佛説放牛經緣起經十一想思念如來經佛説四泥犂經五經同卷阿那邠邸化七子經大愛道般涅槃經佛母般泥洹經三經合卷舍衛國王夢見十事經佛説國王不𥠖先𡰱十夢經阿難同學經五蘊皆空經四經合卷佛説七處三觀經上下佛説聖法印經二經合卷四十經同函善十一卷五陰譬喻經佛説水沫所飄經佛説不自守意經佛説滿願子經轉法輪經佛説三轉法輪經佛説八正道經難提釋經馬有三相經佛説馬有八態譬人經佛説相應相可經十一經合卷治禪病祕要經二卷摩登伽經三卷舍頭諫經一卷修行本起經二卷鬼問目連經雜藏經餓鬼報應經三經合卷阿難問事佛吉凶經慢法經阿難分別經五母子經四經合卷二十二經同函慶九卷沙彌羅經玉耶經玉耶女經阿遬達經摩鄧女經摩登女解形中六事經六經合卷太子瑞應本起經二卷過去現在因果經四卷佛説奈女耆域因緣經一卷佛説奈女耆婆經一卷十經同函尺八卷四十二章經法海經海八功德經三經合卷佛説罪業報應教化地獄經佛説龍王兄弟經長者音恱經三經合卷禪祕要法經三卷佛説七女經佛説八師經佛説越難經佛説所欲致患經阿闍世王問五逆經五經合卷佛説五苦章句經佛説堅意經佛説淨飰王般涅槃經三經合卷佛説進學經得道梯隥錫杖經佛説持錫杖法附佛説貧窮老公經佛説三摩竭經四經合卷十九經同函璧八卷生經五卷蓱沙王五願經琉璃王經二經合卷佛説義足經二卷四經同函單譯經非寶寸陰是競資正法念處經七十卷父事君曰嚴佛本行集經六十卷與十卷本事經七卷佛説興起行經二卷佛説業報差別經一卷三經同函敬九卷佛説大安般守意經二卷佛説罵意經禪行法想經二經合卷佛説處處經一卷佛説分別善惡所起經一卷佛説出家緣經佛説阿含正行經佛説十八泥梨經佛説法受塵經四經合卷須摩提長者經長者懊惱三處經犍陀國王經阿難四事經四經合卷分別經未生怨經四願經猘狗經四經合卷八關齋經孝子經黑氏梵志經阿鳩留經佛為阿支羅迦葉自化作苦經五經合卷二十二經同函孝十卷陰持入經二卷五百弟子自説本起經一卷佛説大迦葉本經佛説四自侵經佛説羅云忍辱經三經合卷佛説沙曷比丘功德經佛為少年比丘説正事經佛説時非時經佛説自愛經四經合卷佛説中心經佛説見正經二經合卷佛説大魚事經阿難七夢經佛説呵雕阿那含經佛説燈指因緣經四經合卷佛説婦人遇辜經佛説四天王經佛説摩訶迦葉度貧母經三經合卷佛説十二品生死經佛説輪轉五道罪福報應經佛説五無反復經佛説佛大僧大經四經合卷佛説耶祗經佛説末羅王經佛説摩達國王經佛説栴陀越國王經四經合卷二十六經同函當十卷佛説五恐怖世經佛説弟子死復生經佛説懈怠耕者經三經合卷佛説辨意長者子所問經佛説無垢優婆夷問經二經合卷佛説賢者五福經天請問經佛説護淨經佛説木槵經佛説無上處經五經合卷佛説因緣僧護經一卷盧至長者因緣經一卷佛説五王經佛説出家功德經佛説栴檀樹經佛説頞多和多耆經四經合卷佛説普達王經佛滅度棺斂葬送經佛説鬼子母經佛説梵摩難國王經四經合卷佛説孫多耶致經佛説父母恩難報經佛説新嵗經佛説羣牛譬經佛説九橫經五經合卷佛説禪行三十七品經比丘避女惡名欲自殺經佛説身觀經佛説無常經佛説八無暇有暇經五經合卷長爪梵志請問經佛説譬喻經佛説比丘𥊸施經佛説略教誡經三十五經同函佛説療痔病經五經合卷宋元入藏諸大小乘經竭十二卷佛説大乘莊嚴寶王經四卷佛説大乘聖無量壽決定光明王如來陀羅尼經佛説大乘聖吉祥陀羅尼經二經合卷佛説無能勝幡王如來莊嚴陀羅𡰱經最勝佛頂陀羅尼經勝佛母小字般若波羅密多經七佛讚唄伽陀四經同卷大方廣捴持寶光明經五卷佛説出生一切如來法眼遍照大力明王經上下同卷九經同函力十卷佛説守護大千國土經三卷佛説樓閣正法甘露鼓經佛説大乘善見變化文殊師利問法經二經同卷分別善惡報應經上下同卷佛頂放無垢光明入普門觀察一切如來心陀羅𡰱經上下同卷大乘日子王所問經佛説金耀童子經二經合卷嗟韉曩法天子受三皈依獲免惡道經佛説校量壽命經讚法界頌附二經合卷聖虛空藏菩薩陀羅尼經佛説大護明大陀羅尼經二經同卷大寒林聖難拏陀羅尼經佛説諸行有餘經息除中夭陀羅尼經祕密篋印心陀羅尼經四經合卷十五經同函忠十二卷消除一切閃電障難隨求如意陀羅尼經最勝上燈明如來陀羅尼經二經合卷妙法聖念處經八卷今作四卷佛説大迦葉問大寶積正法經五卷佛説沙彌十戒儀則經聖持世陀羅尼經二經合卷佛説法集名經多羅菩薩一百八名陀羅𡰱經二經合卷八經同函則八卷盡十卷大方廣菩薩藏文殊師利根本儀軌經二十卷今作十卷十二緣生祥瑞經上下合卷佛説目連所問經外道問大乘無我義經毗俱胝菩薩一百八名經三經合卷讚揚聖德多羅菩薩一百八名經聖觀自在菩薩一百八名經二經合卷勝軍化世百喻伽陀經六道伽他經二經合卷佛説苾芻五法經佛説苾迦尸迦十法經諸佛心印陀羅𡰱經三經同卷妙臂菩薩所問經四卷今合作二卷寶月童子問法經佛説蓮華眼陀羅𡰱經觀想佛母般若波羅密經如意摩尼陀羅尼經四經同卷十七經同二函命十卷佛説大自在天子因地經佛説寶生陀羅尼經佛説十號經佛為娑伽羅龍王所説大乘經四經合卷佛説普賢菩薩陀羅尼經大金剛妙高山樓閣陀羅尼經廣大蓮華莊嚴𭦟那羅滅一切罪陀羅𡰱經三經同卷一切如來大祕密王未曾有最上微妙大曼羅經五卷今作三卷佛説聖寶藏神儀軌經上下合卷佛説寶藏神大明𭦟拏羅儀軌經上下合卷佛説尊聖大明王經佛説智光滅一切業障陀羅𡰱經佛説如意寶捴持王經三經合卷佛説持明藏八大捴持王經聖無能勝金剛火陀羅尼經二經合卷佛説聖大捴持王經佛説最上意陀羅尼經二經合卷十七經同函臨十二卷佛説大摩里支菩薩經七卷今作五卷佛説聖莊嚴陀羅尼經上下合卷佛説聖六字大明王陀羅尼經千轉大明陀羅尼經佛説華積樓閣陀羅𡰱經佛説聖幡瓔珞陀羅尼經四經合卷佛説普賢曼拏羅經一卷佛説長者施報經佛説毗沙門天王經二經合卷佛説毗婆尸佛經上下合卷佛説聖觀自在菩薩梵讚經佛百八名讚經佛説布施經佛説聖曜母陀羅𡰱經四經合卷佛説大三摩惹經佛説月光菩薩經二經合卷十六經同函深十一卷佛説衆許摩訶帝經十三卷今合為九卷佛説文殊師利一百八名梵讚經佛説解憂經犍稚梵讚經三經合卷佛説七佛經一卷佛説大乘無量壽莊嚴王經上中合卷佛説遍照般若波羅密經與莊嚴經下合卷七經同函履十卷佛説帝釋般若波羅密多心經佛説諸佛經大乘舍梨娑擔摩經三經同卷佛説四無所畏經佛説一切如來頂輪王百八名讚經增慧陀羅尼經聖六字增壽大明陀羅𡰱經佛説大乘戒經聖多羅菩薩梵讚經聖救度佛母二十一種禮讚經佛説聖最陀羅𡰱經佛説五千頌聖般若波羅密經九經合卷金剛手菩薩降伏一切部多大教王經三卷最上大乘金剛大寶王經上下合卷佛説薩鉢多酥哩踰𭡠野經佛説一切如來烏瑟膩沙最勝捴持經菩提心觀釋附二經合卷佛母寶德藏般若波羅密經三卷內中下合卷佛説幻化網大瑜伽教十忿怒明王大明觀想儀軌經一卷十八經同函薄十二卷佛説金剛香菩薩大明成就儀軌經三卷金剛薩埵説頻那夜迦天成就儀軌經四卷佛説妙吉祥最勝根本大教經三卷佛説大乘觀想曼拏羅淨諸惡趣經二卷佛説大金剛香陀羅𡰱經附前下卷末十二經同函夙十卷佛説護國尊者所問大乘經四卷今合三卷佛説持明藏瑜伽大教尊那菩薩大明成就儀軌經四卷今合為二卷佛説妙吉祥瑜伽大教金剛陪囉縛輪觀想成就儀軌經一卷大乘八大𭦟拏羅經聖金剛手菩薩一百八名梵讚經佛説較量一切佛剎功德經囉嚩拏説救療小兒疫病經迦葉仙人説醫女人經五經合卷佛説大愛陀羅𡰱經佛説阿羅漢具德經一切佛攝相應大教王經聖觀自在菩薩念誦儀軌經三經合卷佛説俱枳羅陀羅𡰱經佛説消除一切災障寶髻陀羅尼經佛説妙色陀羅尼經佛説栴檀香身陀羅尼經佛説鉢蘭那賖嚩哩大陀羅尼經佛説宿命智陀羅尼經佛説慈氏菩薩誓願陀羅尼經佛説滅除五逆罪大陀羅𡰱經佛説無量功德陀羅𡰱經佛説十八臂陀羅𡰱經佛説洛義陀羅𡰱經佛説辟除諸惡陀羅𡰱經十二經合卷佛説八大靈塔名號經八大靈塔梵讚附三身梵讚附佛説尊那經二經合卷二十五經同函興十一卷佛説瑜伽大教王經五卷寶授菩薩菩提行經𭦟殊室利菩薩吉祥伽陀經佛説妙吉祥菩薩陀羅𡰱經佛説無量壽大智陀羅尼經佛説宿命智陀羅尼經佛説慈氏菩薩陀羅尼經佛説虗空藏菩薩陀羅尼佛三身讚附七經合卷大正句王經上下合卷佛説人仙經佛説舊城喻經佛説頻婆娑羅王經佛説信解智力經四經合卷佛説善樂長者經佛説聖多羅菩薩經二經合卷佛説大吉祥陀羅𡰱經佛説寶賢陀羅𡰱經佛説八名陀羅尼經佛説觀自在菩薩母陀羅尼經佛説戒香經佛説延壽妙門陀羅𡰱經六經合卷佛説一切如來名號陀羅𡰱經佛説