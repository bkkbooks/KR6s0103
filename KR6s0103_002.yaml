body:
  text: 小乘經阿含部剋念佛說長阿含經二十二卷作聖德建名立中阿含經六十卷形端表正空增壹阿含經五十卷谷傅聲虗堂雜阿含經五十卷習針𦗟十三卷別譯雜阿含經二十卷雜阿含經一卷長阿含十報法經二卷禍十一卷佛般泥洹經二卷佛說方等泥洹經二卷大般涅槃經三卷佛說人本欲生經一卷佛說梵志阿颰經一卷佛說梵網六十二見經佛說尸迦羅越六方禮經二經合卷佛說寂志果經一卷八經同函因起世經十卷惡起世囙本經十卷積十卷樓炭經六卷佛說七知經佛說醎水喻經佛說一切流攝守因經三經合卷佛說四諦經佛說恒水經佛說本相倚致經三經合卷中本起經二卷八經同函福十卷佛說緣本致經佛說頂生王故事經佛說文陀竭王經三經合卷佛說閻羅王五天使者經佛說鐵城泥犂經佛說古來世時經三經同卷佛說阿那律八念經佛說離睡經佛說是法非法經三經同卷佛說求欲經佛說受嵗經佛說梵志計水淨經三經同卷佛說苦陰經佛說釋摩男本經佛說苦陰囙事經三經合卷佛說樂想經佛說漏分布經佛說阿耨䟦經三經同卷佛說諸法本經佛說瞿曇記果經佛說瞻婆比丘經三經合卷佛說伏經佛說魔嬈亂經佛說弊魔試目連經三經合卷泥犂經優婆夷墮舍迦經佛說齋經三經合卷佛說廣義法門經佛說戒德香經佛說四人出現世間經三經合卷佛說頼吒和羅經佛說善生子經佛說經佛說梵志頞波羅延問種尊經四經合卷三十四經同函緣十卷三歸五戒慈心猒離功德經佛說湏達經佛為黃竹園老婆羅門說學經佛說梵魔喻經四經合卷佛說尊上經佛說鸚鵡經佛說兜調經佛說意經佛說應法經五經同卷佛說鞞摩肅經佛說婆羅門子命終愛念不離經佛說十支居士八城人經佛說邪見經佛說箭喻經佛說普法義經六經同卷佛說波斯匿王太后崩塵土坌身經湏摩提女經二經同卷婆羅門避死經施食獲五福報經頻婆娑羅王詣佛供養經佛說長者六過出家經佛說鴦掘摩經五經合卷佛說鴦掘髻經佛說四未曾有法經佛說力士移山經佛說舍利弗目犍連遊四衢經四經合卷七佛父母姓字經佛說放牛經緣起經十一想思念如來經佛說四泥犂經五經同卷阿那邠邸化七子經大愛道般涅槃經佛母般泥洹經三經合卷舍衛國王夢見十事經佛說國王不𥠖先𡰱十夢經阿難同學經五蘊皆空經四經合卷佛說七處三觀經上下佛說聖法印經二經合卷四十經同函善十一卷五陰譬喻經佛說水沫所飄經佛說不自守意經佛說滿願子經轉法輪經佛說三轉法輪經佛說八正道經難提釋經馬有三相經佛說馬有八態譬人經佛說相應相可經十一經合卷治禪病秘要經二卷摩登伽經三卷舍頭諫經一卷修行本起經二卷鬼問目連經雜藏經餓鬼報應經三經合卷阿難問事佛吉㐫經𢢔法經阿難分別經五母子經四經合卷二十二經同函慶九卷沙彌羅經玉耶經玉耶女經阿遬達經摩鄧女經摩登女解形中六事經六經合卷太子瑞應本起經二卷過去現在囙果經四卷佛說奈女耆域囙緣經一卷佛說柰女耆婆經一卷十經同函尺八卷四十二章經法海經海八功德經三經合卷佛說罪業報應教化地獄經佛說龍王兄弟經長者音恱經三經合卷禪秘要法經三卷佛說七女經佛說八師經佛說越難經佛說所欲致患經阿闍世王問五逆經五經合卷佛說五苦章句經佛說堅意經佛說淨飰王般涅槃經三經合卷佛說進學經得道梯隥錫杖經佛說持錫杖法附佛說貧竆老公經佛說三摩竭經四經合卷十九經同函璧八卷生經五卷蓱沙王五願經琉璃王經二經合卷佛說義足經二卷四經同函單譯經非寶寸陰是競資正法念處經七十卷父事君曰嚴佛本行集經六十卷與十卷本事經七卷佛說興起行經二卷佛說業報差別經一卷三經同函敬九卷佛說大安般守意經二卷佛說罵意經禪行法想經二經合卷佛說處處經一卷佛說分別善惡所起經一卷佛說出家緣經佛說阿含正行經佛說十八泥梨經佛說法受塵經四經合卷湏摩提長者經長者懊惱三處經犍陀國王經阿難四事經四經合卷分別經未生怨經四願經猘狗經四經合卷八關齋經孝子經黑氏梵志經阿鳩留經佛為阿支羅迦葉自化作苦經五經合卷二十二經同函孝十卷陰持入經二卷五百弟子自說本起經一卷佛說大迦葉本經佛說四自侵經佛說羅云忍辱經三經合卷佛說沙曷比丘功德經佛為少年比丘說正事經佛說時非時經佛說自愛經四經合卷佛說中心經佛說見正經二經合卷佛說大魚事經阿難七夢經佛說呵鵰阿那含經佛說燈指因緣經四經合卷佛說婦人遇辜經佛說四天王經佛說摩訶迦葉度貧母經三經合卷佛說十二品生死經佛說輪轉五道罪福報應經佛說五無反復經佛說佛大僧大經四經合卷佛說耶祗經佛說末羅王經佛說摩達國王經佛說栴陀越國王經四經合卷二十六經同函當十卷佛說五恐怖世經佛說弟子死復生經佛說懈怠耕者經三經合卷佛說辨意長者子所問經佛說無垢優婆夷問經二經合卷佛說賢者五福經天請問經佛說護淨經佛說木槵經佛說無上處經五經合卷佛說囙緣僧護經一卷盧至長者囙緣經一卷佛說五王經佛說出家功德經佛說栴檀樹經佛說頞多和多耆經四經合卷佛說普達王經佛滅度棺斂葬送經佛說鬼子母經佛說梵摩難國王經四經合卷佛說孫多耶致經佛說父母恩難報經佛說新嵗經佛說羣牛譬經佛說九橫經五經合卷佛說禪行三十七品經比丘避女惡名欲自殺經佛說身觀經佛說無常經佛說八無暇有暇經五經合卷長爪梵志請問經佛說譬喻經佛說比丘𦗟施經佛說略教誡經三十五經同函佛說療痔病經五經合卷宋元入藏諸大小乘經竭十二卷佛說大乘莊嚴寶王經四卷佛說大乘聖無量壽决定光明王如來陁羅尼經佛說大乘聖吉祥陀羅尼經二經合卷佛說無能勝旛王如來莊嚴陀羅𡰱經最勝佛頂陀羅尼經勝佛母小字般若波羅密多經七佛讚唄伽陀四經同卷大方廣捴持寶光明經五卷佛說出生一切如來法眼徧照大力明王經上下同卷九經同函力十卷佛說守護大千國土經三卷佛說樓閣正法甘露鼓經佛說大乘善見變化文殊師利問法經二經同卷分別善惡報應經上下同卷佛頂放無垢光明入普門觀察一切如來心陁羅𡰱經上下同卷大乘日子王所問經佛說金耀童子經二經合卷嗟𩋋曩法天子受三皈依獲免惡道經佛說校量壽命經讚法界頌附二經合卷聖虛空藏菩薩陀羅尼經佛說大護明大陀羅尼經二經同卷大寒林聖難拏陀羅尼經佛說諸行有餘經息除中夭陀羅尼經秘密篋印心陀羅尼經四經合卷十五經同函忠十二卷消除一切閃電障難隨求如意陀羅尼經㝡勝上燈明如來陀羅尼經二經合卷妙法聖念處經八卷今作四卷佛說大迦葉問大寶積正法經五卷佛說沙彌十戒儀則經聖持世陀羅尼經二經合卷佛說法集名經多羅菩薩一百八名陀羅𡰱經二經合卷八經同函則八卷盡十卷大方廣菩薩藏文殊師利根本儀軌經二十卷今作十卷十二緣生祥瑞經上下合卷佛說目連所問經外道問大乘無我義經毘俱胝菩薩一百八名經三經合卷讚揚聖德多羅菩薩一百八名經聖觀自在菩薩一百八名經二經合卷勝軍化世百喻伽陁經六道伽他經二經合卷佛說苾蒭五法經佛說苾迦尸迦十法經諸佛心印陀羅𡰱經三經同卷妙臂菩薩所問經四卷今合作二卷寶月童子問法經佛說蓮華眼陀羅𡰱經觀想佛母般若波羅密經如意摩尼陀羅尼經四經同卷十七經同二函命十卷佛說大自在天子因地經佛說寶生陀羅尼經佛說十号經佛為娑伽羅龍王所說大乘經四經合卷佛說普賢菩薩陀羅尼經大金剛妙高山樓閣陀羅尼經廣大蓮華莊嚴𭦟那羅滅一切罪陀羅𡰱經三經同卷一切如來大秘密王未曾有最上微妙大曼羅經五卷今作三卷佛說聖寶藏神儀軌經上下合卷佛說寶藏神大明𭦟拏羅儀軌經上下合卷佛說尊聖大明王經佛說智光滅一切業障陀羅𡰱經佛說如意寶捴持王經三經合卷佛說持明藏八大捴持王經聖無能勝金剛火陀羅尼經二經合卷佛說聖大捴持王經佛說最上意陀羅尼經二經合卷十七經同函臨十二卷佛說大摩里支菩薩經七卷今作五卷佛說聖莊嚴陀羅尼經上下合卷佛說聖六字大明王陀羅尼經千轉大明陀羅尼經佛說華積樓閣陀羅𡰱經佛說聖幡瓔珞陀羅尼經四經合卷佛說普賢曼拏羅經一卷佛說長者施報經佛說毗沙門天王經二經合卷佛說毘婆尸佛經上下合卷佛說聖觀自在菩薩梵讚經佛百八名讚經佛說布施經佛說聖曜母陀羅𡰱經四經合卷佛說大三摩惹經佛說月光菩薩經二經合卷十六經同函深十一卷佛說眾許摩訶帝經十三卷今合為九卷佛說文殊師利一百八名梵讚經佛說解憂經犍稚梵讚經三經合卷佛說七佛經一卷佛說大乘無量壽莊嚴王經上中合卷佛說徧照般若波羅密經與莊嚴經下合卷七經同函履十卷佛說帝釋般若波羅密多心經佛說諸佛經大乘舍梨娑擔摩經三經同卷佛說四無所畏經佛說一切如來頂輪王百八名讚經增慧陀羅尼經聖六字增壽大明陀羅𡰱經佛說大乘戒經聖多羅菩薩梵讚經聖救度佛母二十一種禮讚經佛說聖㝡陀羅𡰱經佛說五千頌聖般若波羅密經九經合卷金剛手菩薩降伏一切部多大教王經三卷最上大乘金剛大寶王經上下合卷佛說薩鉢多酥哩踰𭡠野經佛說一切如來烏瑟膩沙㝡勝捴持經菩提心觀釋附二經合卷佛母寶德藏般若波羅密經三卷內中下合卷佛說幻化網大瑜伽教十忿怒明王大明觀想儀軌經一卷十八經同函薄十二卷佛說金剛香菩薩大明成就儀軌經三卷金剛薩埵說頻那夜迦天成就儀軌經四卷佛說妙吉祥最勝根本大教經三卷佛說大乘觀想曼拏羅淨諸惡趣經二卷佛說大金剛香陁羅𡰱經附前下卷末十二經同函夙十卷佛說護國尊者所問大乘經四卷今合三卷佛說持明藏瑜伽大教尊那菩薩大明成就儀軌經四卷今合為二卷佛說妙吉祥瑜伽大教金剛陪囉縛輪觀想成就儀軌經一卷大乘八大𭦟拏羅經聖金剛手菩薩一百八名梵讚經佛說較量一切佛剎功德經囉嚩拏說救療小兒疫病經迦葉仙人說醫女人經五經合卷佛說大愛陀羅𡰱經佛說阿羅漢具德經一切佛攝相應大教王經聖觀自在菩薩念誦儀軌經三經合卷佛說俱枳羅陀羅𡰱經佛說消除一切灾障寶髻陀羅尼經佛說妙色陀羅尼經佛說栴檀香身陁羅尼經佛說鉢蘭那賖嚩哩大陀羅尼經佛說宿命智陀羅尼經佛說慈氏菩薩誓願陁羅尼經佛說滅除五逆罪大陁羅𡰱經佛說無量功德陀羅𡰱經佛說十八臂陀羅𡰱經佛說洛义陀羅𡰱經佛說辟除諸惡陀羅𡰱經十二經合卷佛說八大靈塔名号經八大靈塔梵讚附三身梵讚附佛說尊那經二經合卷二十五經同函興十一卷佛說瑜伽大教王經五卷寶授菩薩菩提行經𭦟殊室利菩薩吉祥伽陀經佛說妙吉祥菩薩陀羅𡰱經佛說無量壽大智陁羅尼經佛說宿命智陀羅尼經佛說慈氏菩薩陀羅尼經佛說虗空藏菩薩陁羅尼佛三身讚附七經合卷大正句王經上下合卷佛說人仙經佛說舊城喻經佛說頻婆娑羅王經佛說信解智力經四經合卷佛說善樂長者經佛說聖多羅菩薩經二經合卷佛說大吉祥陀羅𡰱經佛說寶賢陀羅𡰱經佛說八名陁羅尼經佛說觀自在菩薩母陀羅尼經佛說戒香經佛說延壽妙門陀羅𡰱經六經合卷佛說一切如來名号陁羅𡰱經佛說